<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シンプルじゃんけん</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; }
        button { font-size: 24px; padding: 10px 20px; margin: 10px; cursor: pointer; }
        #result { font-size: 32px; font-weight: bold; margin-top: 30px; color: #333; }
    </style>
</head>
<body>
    <h1>AIとじゃんけん！</h1>
    <button onclick="play('グー')">✊ グー</button>
    <button onclick="play('チョキ')">✌️ チョキ</button>
    <button onclick="play('パー')">✋ パー</button>
    <div id="result">何を出しますか？</div>

    <script>
        function play(userHand) {
            const hands = ['グー', 'チョキ', 'パー'];
            const aiHand = hands[Math.floor(Math.random() * 3)];
            let message = `あなたは【${userHand}】、AIは【${aiHand}】。<br>`;

            if (userHand === aiHand) {
                message += "結果は… 引き分け！";
            } else if (
                (userHand === 'グー' && aiHand === 'チョキ') ||
                (userHand === 'チョキ' && aiHand === 'パー') ||
                (userHand === 'パー' && aiHand === 'グー')
            ) {
                message += "結果は… <span style='color:red;'>あなたの勝ち！</span>";
            } else {
                message += "結果は… <span style='color:blue;'>あなたの負け！</span>";
            }
            document.getElementById('result').innerHTML = message;
        }
    </script>
</body>
</html>
