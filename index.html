<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>即席あみだくじ</title>
    <style>
        body { text-align: center; font-family: sans-serif; }
        canvas { background: #f9f9f9; border: 1px solid #ccc; margin-top: 20px; }
        button { font-size: 18px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>簡単あみだくじ</h1>
    <p>人数：<input type="number" id="players" value="4" min="2" max="10"> 
    <button onclick="drawAmida()">くじを作成</button></p>
    <canvas id="amidaCanvas" width="400" height="400"></canvas>

    <script>
        function drawAmida() {
            const canvas = document.getElementById('amidaCanvas');
            const ctx = canvas.getContext('2d');
            const num = document.getElementById('players').value;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const spacing = canvas.width / (parseInt(num) + 1);
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;

            // 縦線を引く
            for (let i = 1; i <= num; i++) {
                ctx.beginPath();
                ctx.moveTo(i * spacing, 50);
                ctx.lineTo(i * spacing, 350);
                ctx.stroke();

                // 横線をランダムに引く
                if (i < num) {
                    for (let j = 70; j < 330; j += 40) {
                        if (Math.random() > 0.5) {
                            ctx.beginPath();
                            ctx.moveTo(i * spacing, j);
                            ctx.lineTo((i + 1) * spacing, j);
                            ctx.stroke();
                        }
                    }
                }
            }
            ctx.fillText("スタート", spacing - 20, 40);
            ctx.fillText("ゴール", spacing - 15, 370);
        }
        // 初回実行
        drawAmida();
    </script>
</body>
</html>
